<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--red:#ff2b2b;--bg:#000}
*{box-sizing:border-box}
body{margin:0;font-family:'JetBrains Mono',monospace;background:var(--bg);color:#fff;overflow:hidden}
.bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(.35) saturate(1.2)}
.overlay{position:fixed;inset:0;background:radial-gradient(circle at center, rgba(255,0,0,.18), rgba(0,0,0,.92));z-index:-1}
.container{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;padding:20px;text-align:center}
.welcome { width: min(920px,95%); padding:48px; border-radius:18px; background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.35)); border:1px solid rgba(255,255,255,0.04); box-shadow:0 20px 60px rgba(0,0,0,0.6); transform-style:preserve-3d;}
.intro { animation: introIn .9s cubic-bezier(.2,.9,.3,1) forwards; }
@keyframes introIn { from{ transform: translateZ(-90px) translateY(20px) scale(.98); opacity:0 } to{ transform:none; opacity:1 } }
.intro-out{ animation:introOut .6s ease forwards; }
@keyframes introOut { from{ opacity:1 } to{ transform:translateY(-30px) scale(.98); opacity:0 } }
#poda{ display:flex; align-items:center; justify-content:center; position:relative }
.input { background-color:#010201; border:none; width:320px; height:56px; border-radius:10px; color:white; padding-inline:22px; font-size:18px; }
.input::placeholder{ color:#c0b9c0 }
.btn {
  display:flex; justify-content:center; align-items:center; width:14rem; height:3rem; border-radius:5rem; cursor:pointer;
  transition: transform .12s ease, box-shadow .12s ease;
  border: double 4px transparent;
  background-image: linear-gradient(#111,#111), linear-gradient(137deg, #ff8a8a, #ff3b3b 60%, #c52a2a 85%);
  background-origin: border-box; background-clip: content-box, border-box; color:#fff; font-weight:800; letter-spacing:1px;
  box-shadow: 0 8px 30px rgba(255,50,50,0.06);
}
.btn:hover{ transform: translateY(-3px); box-shadow: 0 18px 60px rgba(255,20,20,0.06); }
.btn:active{ transform: scale(.98); border: double 4px #ff4c4c; }
.auth-note{ font-size:13px;color:#ddd; opacity:.9; margin-top:8px }
@media (max-width:600px){ .input{ width:260px; } .btn{ width:11rem } }
</style>
</head>
<body>
  <img src="lv_0_20260223184623.gif" class="bg" alt="bg">
  <div class="overlay"></div>

  <div class="container">
    <div id="welcomeCard" class="welcome intro" role="banner">
      <h1 style="margin:0;font-size:36px;letter-spacing:6px;text-transform:uppercase">Welcome</h1>
      <p style="opacity:.85;margin-top:8px">Enter your Roblox username to continue</p>
    </div>

    <div id="inputBlock" style="opacity:0; transform:translateY(18px); transition:all .6s ease;" aria-hidden="true">
      <div id="poda" aria-hidden="false">
        <div id="main">
          <input id="robloxUser" class="input" placeholder="Roblox username..." type="text" />
        </div>
      </div>

      <div style="margin-top:18px;display:flex;flex-direction:column;align-items:center;gap:8px">
        <button id="authBtn" class="btn"><strong>AUTHORISE USERNAME</strong></button>
        <div class="auth-note">By authorising you will create a local profile on this device.</div>
      </div>
    </div>
  </div>

<script>
(function(){
  const existingProfile = JSON.parse(localStorage.getItem('clanProfile') || '{}');
  if (existingProfile.username && existingProfile.displayName) {
    location.href = 'Dashboard.html';
  }
})();

const welcome = document.getElementById('welcomeCard');
const inputBlock = document.getElementById('inputBlock');
const robloxUserInput = document.getElementById('robloxUser');
const authBtn = document.getElementById('authBtn');

setTimeout(()=> {
  welcome.classList.add('intro-out');
  setTimeout(()=> {
    welcome.style.display = 'none';
    inputBlock.style.opacity = '1';
    inputBlock.style.transform = 'translateY(0)';
    inputBlock.setAttribute('aria-hidden','false');
    robloxUserInput.focus();
  }, 520);
}, 1200);

authBtn.addEventListener('click', ()=> {
  const username = (robloxUserInput.value || '').trim();
  if(!username) { alert('Please enter your Roblox username'); robloxUserInput.focus(); return; }
  const existing = JSON.parse(localStorage.getItem('clanProfile') || '{}');
  localStorage.setItem('clanProfile', JSON.stringify({ ...existing, username }));
  authBtn.style.transform = 'scale(.98)';
  setTimeout(()=> authBtn.style.transform = '', 120);
  location.href = existing.displayName ? 'Dashboard.html' : 'profile.html';
});
</script>
</body>
</html>
