<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clan Portal | Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-red center-page">
  <main class="card welcome-card">
    <h1 class="glow-text">Welcome to the Clan Hub</h1>
    <p class="subtitle">Enter your Roblox username to continue.</p>
    <form id="welcomeForm" class="stack">
      <label for="robloxUsername">Roblox Username</label>
      <input id="robloxUsername" name="robloxUsername" type="text" required maxlength="30" placeholder="e.g. BladeMaster123" />
      <button class="btn" type="submit">Authorize</button>
    </form>
  </main>
  <script>
    const form = document.getElementById('welcomeForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('robloxUsername').value.trim();
      if (!username) return;
      const existing = JSON.parse(localStorage.getItem('clanProfile') || '{}');
      localStorage.setItem('clanProfile', JSON.stringify({ ...existing, username }));
      window.location.href = 'profile.html';
    });
  </script>
</body>
</html>
