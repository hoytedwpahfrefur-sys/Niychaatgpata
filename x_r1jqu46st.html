<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Request Panel</title>
<style>body{font-family:Arial;background:#0b0b0b;color:#eee;padding:20px}.card{border:1px solid #400;padding:12px;margin:10px 0;background:#151515}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{padding:6px 10px;border:1px solid #900;background:#220;color:#fff;cursor:pointer}.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center}.modal.open{display:flex}.box{max-width:760px;width:95%;max-height:90vh;overflow:auto;background:#111;border:1px solid #700;padding:16px}</style></head>
<body><h1>Request Panel</h1><div id='list'></div><div id='modal' class='modal'><div class='box'><div class='row'><h3 style='margin:0;flex:1'>Request Details</h3><button class='btn' id='closeM'>Close</button></div><pre id='details' style='white-space:pre-wrap'></pre><img id='proof' style='max-width:100%;display:none;border:1px solid #333'/></div></div>
<script>
const modal=document.getElementById('modal');document.getElementById('closeM').onclick=()=>modal.classList.remove('open');
async function load(){const res=await fetch('/api/applications');const data=await res.json();const list=document.getElementById('list');list.innerHTML='';data.forEach(r=>{const d=document.createElement('div');d.className='card';d.innerHTML=`<div><b>${r.username}</b> (${r.status})</div><div>Kills: ${r.kills||0}</div><div>Main: ${r.mainCharacter||'-'}</div><div>${r.skills||''}</div><div class='row'><button class='btn o'>Open Request</button><button class='btn a'>Accept</button><button class='btn d'>Decline</button></div>`;d.querySelector('.o').onclick=()=>openRequest(r);d.querySelector('.a').onclick=()=>decide(r.username,'accepted');d.querySelector('.d').onclick=()=>decide(r.username,'declined');list.appendChild(d);});}
function openRequest(r){document.getElementById('details').textContent=JSON.stringify(r.formData||r,null,2);const img=document.getElementById('proof');if(r.proofImage){img.src=r.proofImage;img.style.display='block';}else{img.style.display='none';}modal.classList.add('open');}
async function decide(username,status){await fetch('/api/applications/'+encodeURIComponent(username)+'/decision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});load();}
load();
</script></body></html>
