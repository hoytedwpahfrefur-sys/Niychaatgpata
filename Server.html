<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clan Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="theme-red server-layout" id="serverLayout">
  <aside class="server-sidebar" id="serverSidebar">
    <div class="server-top-row">
      <button id="serverMenuBtn" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
      <h2>Clan Server</h2>
    </div>

    <div id="serverMiniMenu" class="server-mini-menu hidden-left">
      <a class="server-nav-link" href="Dashboard.html">Dashboard</a>
    </div>

    <div class="category">IMPORTANT</div>
    <button class="channel" data-channel="rules"><i class="fa-solid fa-book"></i> rules</button>
    <button class="channel" data-channel="announcement"><i class="fa-solid fa-bullhorn"></i> announcement</button>
    <button class="channel" data-channel="sub_announcement"><i class="fa-solid fa-bell"></i> sub_announcement</button>
    <button class="channel" data-channel="giveaway"><i class="fa-solid fa-gift"></i> giveaway</button>

    <div class="category">LINEUPS</div>
    <button class="channel" data-channel="main_lineup"><i class="fa-solid fa-bolt"></i> main_lineup</button>
    <button class="channel" data-channel="sub_lineup"><i class="fa-solid fa-snowflake"></i> sub_lineup</button>

    <div class="category">SOCIAL</div>
    <button class="channel" data-channel="chat"><i class="fa-solid fa-comments"></i> chat</button>
    <button class="channel" data-channel="media"><i class="fa-solid fa-camera"></i> media</button>

    <div class="category">HOSTING</div>
    <button class="channel" data-channel="tryouts"><i class="fa-solid fa-bullseye"></i> tryouts</button>
    <button class="channel" data-channel="tryouts_result"><i class="fa-solid fa-tornado"></i> tryouts_result</button>
  </aside>

  <main class="channel-panel hidden" id="channelPanel">
    <div class="chat-header channel-header">
      <h3 id="currentChannel"># rules</h3>
      <div>
        <button class="icon-btn" id="closeChannelView" title="Close channel"><i class="fa-solid fa-xmark"></i></button>
        <button class="icon-btn" onclick="location.href='Dashboard.html'"><i class="fa-solid fa-arrow-left"></i></button>
      </div>
    </div>
    <div id="channelMessages" class="messages"></div>
    <form id="channelForm" class="chat-form sticky-form">
      <label class="icon-btn" for="channelImage"><i class="fa-solid fa-plus"></i></label>
      <input id="channelImage" type="file" accept="image/*" class="hidden" />
      <input id="channelText" type="text" placeholder="Message channel..." />
      <button class="btn">Send</button>
    </form>
  </main>

  <section id="userProfileModal" class="modal hidden">
    <div class="card modal-card">
      <div class="chat-header modal-header">
        <div class="modal-profile-head"><img id="modalPfp" class="top-pfp" src="" alt="pfp" /><div><h3 id="modalDisplayName">Profile</h3><div id="modalUserMeta" class="ticket-meta"></div></div></div>
        <button id="closeUserModal" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <p><strong>Roblox:</strong> <span id="modalRoblox"></span></p>
      <p><strong>Pronouns:</strong> <span id="modalPronoun"></span></p>
      <p><strong>Description:</strong> <span id="modalDesc"></span></p>
      <div id="dmMessages" class="messages dm-box"></div>
      <form id="dmForm" class="chat-form sticky-form">
        <input id="dmText" type="text" placeholder="Message this user..." required />
        <button class="btn">Send</button>
      </form>
    </div>
  </section>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="server.js"></script>
</body>
</html>
