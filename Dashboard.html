<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clan Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="theme-red">
  <header class="topbar">
    <button id="menuBtn" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
    <h1>Dashboard</h1>
    <div class="profile-menu-wrap">
      <img id="topPfp" class="top-pfp" src="" alt="profile" />
      <div id="profileDropdown" class="dropdown hidden">
        <a class="menu-link" href="profile.html"><i class="fa-solid fa-user-pen"></i> Profile Settings</a>
        <div class="ticket-meta">Session is saved on this device.</div>
        <button id="closeDropdown" class="menu-btn"><i class="fa-solid fa-xmark"></i> Close Menu</button>
      </div>
    </div>
  </header>

  <aside id="sideMenu" class="side-menu hidden-left">
    <button id="chatOpen" class="menu-item">Chat</button>
    <a class="menu-item" href="Server.html">Server</a>
  </aside>

  <main class="container">
    <section class="card">
      <h2 id="greeting" class="greeting">Hey Player!</h2>
      <p class="subtitle">Stats overview</p>
      <section class="horizontal">
        <article class="mini-card"><h3>Kills</h3><p id="killsVal">Pending</p><small>the amount of kill u have in tsb</small></article>
        <article class="mini-card"><h3>Points</h3><p id="pointsVal">Pending</p><small>u get points after you help an admin</small></article>
        <article class="mini-card"><h3>Role</h3><p id="roleVal">Pending</p><small>special role that are displayed on your profile</small></article>
      </section>
    </section>

    <section class="card">
      <h2>Leaderboard</h2>
      <div class="radio-row">
        <label><input type="radio" name="boardType" value="kills" checked> Kills</label>
        <label><input type="radio" name="boardType" value="points"> Points</label>
      </div>
      <ol id="leaderboard"></ol>
    </section>
  </main>

  <section id="dashChat" class="chat-window hidden">
    <div class="chat-header dash-chat-header"><h3>Dashboard Chat</h3><button id="closeChat" class="icon-btn"><i class="fa-solid fa-xmark"></i></button></div>
    <div id="dashMessages" class="messages"></div>
    <form id="dashChatForm" class="chat-form sticky-form">
      <input id="dashMsg" placeholder="Send a message to ticket panel..." required>
      <button class="btn">Send</button>
    </form>
  </section>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
